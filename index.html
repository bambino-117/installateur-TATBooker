<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TATBooker - Installateur universel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .installer {
            max-width: 800px;
            width: 100%;
            background: #0f0f1a;
            border-radius: 32px;
            border: 1px solid #2a2a3a;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            background: linear-gradient(135deg, #1e293b, #0f0f1a);
            padding: 32px;
            text-align: center;
            border-bottom: 1px solid #2a2a3a;
        }

        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header p {
            color: #94a3b8;
            margin-top: 8px;
        }

        .content {
            padding: 32px;
        }

        .os-detection {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: center;
            border: 1px solid #2a2a3a;
        }

        .os-badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #0f0f1a;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 600;
        }

        .os-badge.windows { color: #00d9ff; border-left: 3px solid #00d9ff; }
        .os-badge.linux { color: #fbbf24; border-left: 3px solid #fbbf24; }
        .os-badge.macos { color: #a78bfa; border-left: 3px solid #a78bfa; }
        .os-badge.chromeos { color: #34c759; border-left: 3px solid #34c759; }
        .os-badge.unknown { color: #94a3b8; border-left: 3px solid #94a3b8; }

        .instruction-box {
            background: #0a0a10;
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #2a2a3a;
        }

        .instruction-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #60a5fa;
            margin-bottom: 12px;
        }

        .command {
            background: #000000;
            padding: 16px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: #a78bfa;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            border: 1px solid #2a2a3a;
        }

        .copy-btn {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            margin-top: 12px;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: #2563eb;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 16px 0;
            padding: 12px;
            background: #1a1a2e;
            border-radius: 12px;
        }

        .step-number {
            width: 28px;
            height: 28px;
            background: #3b82f6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            color: white;
        }

        .download-btn {
            display: inline-block;
            background: linear-gradient(135deg, #3b82f6, #a78bfa);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 16px;
            transition: transform 0.1s;
        }

        .download-btn:hover {
            transform: scale(1.02);
        }

        .footer {
            padding: 20px 32px;
            border-top: 1px solid #2a2a3a;
            font-size: 0.7rem;
            color: #6b7280;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="installer">
    <div class="header">
        <h1>🚀 TATBooker</h1>
        <p>Installateur universel — détection automatique de votre système</p>
    </div>

    <div class="content">
        <div class="os-detection" id="osDetection">
            <div class="os-badge" id="osBadge">
                <span>🖥️</span>
                <span id="osName">Détection en cours...</span>
            </div>
        </div>

        <div id="instructions"></div>

        <div style="text-align: center; margin-top: 24px;">
            <a href="#" id="downloadLink" class="download-btn" download>📥 Télécharger le script d'installation</a>
        </div>
    </div>

    <div class="footer">
        🔒 Aucune donnée n'est collectée. L'installation se fait entièrement sur votre machine.
    </div>
</div>

<script>
    // ============================================================
    // CONFIGURATION - À MODIFIER SI NÉCESSAIRE
    // ============================================================
    const REPO_URL = "https://github.com/bambino-117/TATBooker---Developpement.git";
    const REPO_RAW = "https://raw.githubusercontent.com/bambino-117/TATBooker---Developpement/main";
    const MAIN_FILE = "main.py";
    const REQUIREMENTS = "requirements.txt";
    
    // Noms des scripts d'installation (à la racine de votre dépôt)
    const SCRIPTS = {
        windows: "INSTALLER.bat",
        linux: "install.sh",
        macos: "install.command"
    };
    // ============================================================

    function detectOS() {
        const ua = navigator.userAgent.toLowerCase();
        if (ua.includes('win')) return { name: 'Windows', type: 'windows', icon: '🪟' };
        if (ua.includes('mac')) return { name: 'macOS', type: 'macos', icon: '🍎' };
        if (ua.includes('linux')) {
            if (ua.includes('cros')) return { name: 'ChromeOS Flex', type: 'chromeos', icon: '🌐' };
            return { name: 'Linux', type: 'linux', icon: '🐧' };
        }
        return { name: 'Non détecté', type: 'unknown', icon: '❓' };
    }

    const os = detectOS();
    document.getElementById('osBadge').innerHTML = `<span>${os.icon}</span><span>${os.name} détecté</span>`;
    document.getElementById('osBadge').className = `os-badge ${os.type}`;

    const instructionsMap = {
        windows: {
            steps: [
                "Téléchargez le script ci-dessous (ou cliquez sur 'Télécharger')",
                "Faites **clic droit** sur le fichier → 'Exécuter en tant qu'administrateur'",
                "Patientez pendant l'installation automatique",
                "Un raccourci apparaîtra sur votre Bureau"
            ],
            commandContent: `@echo off
chcp 65001 > nul
title TATBooker - Installateur automatique
color 0A

net session >nul 2>&1
if %errorlevel% neq 0 (
    echo Droits administrateur requis. Clic droit -> Executer en tant qu'administrateur
    pause
    exit /b 1
)

echo Installation de TATBooker...
where git >nul 2>&1
if %errorlevel% neq 0 (
    echo Git non trouve. Installation...
    powershell -Command "Invoke-WebRequest -Uri 'https://github.com/git-for-windows/git/releases/download/v2.45.0.windows.1/Git-2.45.0-64-bit.exe' -OutFile '%temp%\\GitInstaller.exe'"
    start /wait %temp%\\GitInstaller.exe /VERYSILENT /NORESTART
    del %temp%\\GitInstaller.exe
)

set APP_DIR=%USERPROFILE%\\TATBooker
if exist "%APP_DIR%" (
    cd /d "%APP_DIR%"
    git pull
) else (
    git clone ${REPO_URL} "%APP_DIR%"
    cd /d "%APP_DIR%"
)

where python >nul 2>&1
if %errorlevel% neq 0 (
    if "%PROCESSOR_ARCHITECTURE%"=="AMD64" (
        set PYTHON_URL=https://www.python.org/ftp/python/3.12.0/python-3.12.0-amd64.exe
    ) else (
        set PYTHON_URL=https://www.python.org/ftp/python/3.12.0/python-3.12.0.exe
    )
    powershell -Command "Invoke-WebRequest -Uri %PYTHON_URL% -OutFile '%temp%\\PythonInstaller.exe'"
    start /wait %temp%\\PythonInstaller.exe /quiet InstallAllUsers=1 PrependPath=1
    del %temp%\\PythonInstaller.exe
)

if not exist "venv" python -m venv venv
call venv\\Scripts\\activate.bat
python -m pip install --upgrade pip
pip install -r ${REQUIREMENTS}

powershell -Command "$WS = New-Object -ComObject WScript.Shell; $SC = $WS.CreateShortcut('%USERPROFILE%\\Desktop\\TATBooker.lnk'); $SC.TargetPath = '%APP_DIR%\\venv\\Scripts\\python.exe'; $SC.Arguments = '%APP_DIR%\\\\${MAIN_FILE}'; $SC.Save()"

echo Installation terminee !
pause`,
            scriptName: "INSTALLER_TATBooker.bat"
        },
        linux: {
            steps: [
                "Ouvrez un terminal (Ctrl+Alt+T)",
                "Copiez-collez la commande ci-dessous",
                "Patientez pendant l'installation",
                "TATBooker sera dans votre menu Applications"
            ],
            commandContent: `#!/bin/bash
echo "Installation TATBooker..."
if ! command -v git &> /dev/null; then
    if command -v apt &> /dev/null; then sudo apt update && sudo apt install -y git
    elif command -v pacman &> /dev/null; then sudo pacman -S --noconfirm git
    elif command -v dnf &> /dev/null; then sudo dnf install -y git
    else echo "Installez Git manuellement"; exit 1; fi
fi

APP_DIR="$HOME/TATBooker"
if [ -d "$APP_DIR" ]; then cd "$APP_DIR" && git pull
else git clone ${REPO_URL} "$APP_DIR" && cd "$APP_DIR"
fi

if ! command -v python3 &> /dev/null; then
    if command -v apt &> /dev/null; then sudo apt install -y python3 python3-pip python3-venv
    elif command -v pacman &> /dev/null; then sudo pacman -S --noconfirm python python-pip
    elif command -v dnf &> /dev/null; then sudo dnf install -y python3 python3-pip
    else echo "Installez Python3 manuellement"; exit 1; fi
fi

if [ ! -d "venv" ]; then python3 -m venv venv; fi
source venv/bin/activate
pip install --upgrade pip
pip install -r ${REQUIREMENTS}

mkdir -p ~/.local/share/applications
cat > ~/.local/share/applications/tatbooker.desktop << EOF
[Desktop Entry]
Name=TATBooker
Exec=$APP_DIR/venv/bin/python3 $APP_DIR/${MAIN_FILE}
Icon=$APP_DIR/icon.png
Terminal=false
Type=Application
Categories=Office;
EOF

echo "Installation terminee !"`,
            scriptName: "install_TATBooker.sh"
        },
        macos: {
            steps: [
                "Téléchargez le script ci-dessous",
                "Dans le Terminal : chmod +x ~/Downloads/install_TATBooker.command",
                "Double-cliquez sur le fichier",
                "Suivez les instructions"
            ],
            commandContent: `#!/bin/bash
echo "Installation TATBooker sur macOS..."
if ! command -v brew &> /dev/null; then
    /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
fi
brew install git python@3.12

APP_DIR="$HOME/TATBooker"
if [ -d "$APP_DIR" ]; then cd "$APP_DIR" && git pull
else git clone ${REPO_URL} "$APP_DIR" && cd "$APP_DIR"
fi

if [ ! -d "venv" ]; then python3 -m venv venv; fi
source venv/bin/activate
pip install --upgrade pip
pip install -r ${REQUIREMENTS}

echo "Installation terminee !"`,
            scriptName: "install_TATBooker.command"
        },
        chromeos: {
            steps: [
                "Activez Linux (Paramètres → Développeurs → Linux)",
                "Ouvrez le terminal Linux",
                "Copiez-collez la commande ci-dessous"
            ],
            commandContent: `sudo apt update
sudo apt install -y git python3 python3-pip python3-venv
git clone ${REPO_URL} ~/TATBooker
cd ~/TATBooker
python3 -m venv venv
source venv/bin/activate
pip install -r ${REQUIREMENTS}
echo "Installation terminee !"`,
            scriptName: "install_TATBooker_chromeos.sh"
        },
        unknown: {
            steps: [
                "Votre système n'a pas été détecté automatiquement.",
                "TATBooker fonctionne sur Windows, macOS, Linux et ChromeOS.",
                "Visitez le dépôt pour l'installation manuelle :"
            ],
            commandContent: REPO_URL,
            scriptName: null
        }
    };

    const info = instructionsMap[os.type];
    const instructionsDiv = document.getElementById('instructions');
    
    let html = `<div class="instruction-box">`;
    html += `<div class="instruction-title">📋 INSTRUCTIONS (${os.name})</div>`;
    
    info.steps.forEach((step, idx) => {
        html += `<div class="step"><div class="step-number">${idx+1}</div><div>${step}</div></div>`;
    });
    
    if (info.commandContent && !info.commandContent.startsWith('http')) {
        html += `<div class="instruction-title" style="margin-top:16px;">💻 À copier dans le terminal</div>`;
        html += `<div class="command" id="commandText">${info.commandContent.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>`;
        html += `<button class="copy-btn" onclick="copyCommand()">📋 Copier la commande</button>`;
    } else if (info.commandContent && info.commandContent.startsWith('http')) {
        html += `<div class="command"><a href="${info.commandContent}" target="_blank" style="color:#a78bfa;">${info.commandContent}</a></div>`;
    }
    
    html += `</div>`;
    instructionsDiv.innerHTML = html;

    const downloadLink = document.getElementById('downloadLink');
    if (info.scriptName) {
        const blob = new Blob([info.commandContent], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        downloadLink.href = url;
        downloadLink.download = info.scriptName;
        downloadLink.textContent = `📥 Télécharger ${info.scriptName}`;
    } else {
        downloadLink.style.display = 'none';
    }

    window.copyCommand = function() {
        const text = document.getElementById('commandText').innerText;
        navigator.clipboard.writeText(text);
        alert('Commande copiée dans le presse-papier !');
    };
</script>
</body>
</html>
