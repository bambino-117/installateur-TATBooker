<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TATBooker - Installateur universel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .installer {
            max-width: 800px;
            width: 100%;
            background: #0f0f1a;
            border-radius: 32px;
            border: 1px solid #2a2a3a;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            background: linear-gradient(135deg, #1e293b, #0f0f1a);
            padding: 32px;
            text-align: center;
            border-bottom: 1px solid #2a2a3a;
        }

        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header p {
            color: #94a3b8;
            margin-top: 8px;
        }

        .content {
            padding: 32px;
        }

        .os-detection {
            background: #1a1a2e;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 24px;
            text-align: center;
            border: 1px solid #2a2a3a;
        }

        .os-badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #0f0f1a;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 600;
        }

        .os-badge.windows { color: #00d9ff; border-left: 3px solid #00d9ff; }
        .os-badge.linux { color: #fbbf24; border-left: 3px solid #fbbf24; }
        .os-badge.macos { color: #a78bfa; border-left: 3px solid #a78bfa; }
        .os-badge.chromeos { color: #34c759; border-left: 3px solid #34c759; }
        .os-badge.unknown { color: #94a3b8; border-left: 3px solid #94a3b8; }

        .instruction-box {
            background: #0a0a10;
            border-radius: 16px;
            padding: 20px;
            margin: 20px 0;
            border: 1px solid #2a2a3a;
        }

        .instruction-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #60a5fa;
            margin-bottom: 12px;
        }

        .command {
            background: #000000;
            padding: 16px;
            border-radius: 12px;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            color: #a78bfa;
            overflow-x: auto;
            white-space: pre-wrap;
            word-break: break-all;
            border: 1px solid #2a2a3a;
        }

        .copy-btn {
            background: #3b82f6;
            border: none;
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
            margin-top: 12px;
            transition: all 0.2s;
        }

        .copy-btn:hover {
            background: #2563eb;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 16px 0;
            padding: 12px;
            background: #1a1a2e;
            border-radius: 12px;
        }

        .step-number {
            width: 28px;
            height: 28px;
            background: #3b82f6;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: bold;
            color: white;
        }

        .download-btn {
            display: inline-block;
            background: linear-gradient(135deg, #3b82f6, #a78bfa);
            color: white;
            padding: 12px 24px;
            border-radius: 40px;
            text-decoration: none;
            font-weight: 600;
            margin-top: 16px;
            transition: transform 0.1s;
        }

        .download-btn:hover {
            transform: scale(1.02);
        }

        .footer {
            padding: 20px 32px;
            border-top: 1px solid #2a2a3a;
            font-size: 0.7rem;
            color: #6b7280;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="installer">
    <div class="header">
        <h1>🚀 TATBooker</h1>
        <p>Installateur universel — détection automatique de votre système</p>
    </div>

    <div class="content">
        <!-- Détection OS -->
        <div class="os-detection" id="osDetection">
            <div class="os-badge" id="osBadge">
                <span>🖥️</span>
                <span id="osName">Détection en cours...</span>
            </div>
        </div>

        <!-- Instructions -->
        <div id="instructions">
            <!-- Rempli par JS -->
        </div>

        <!-- Téléchargement alternatif -->
        <div style="text-align: center; margin-top: 24px;">
            <a href="#" id="downloadLink" class="download-btn" download>📥 Télécharger le script d'installation</a>
        </div>
    </div>

    <div class="footer">
        🔒 Aucune donnée n'est collectée. L'installation se fait entièrement sur votre machine.
    </div>
</div>

<script>
    // Détection de l'OS
    function detectOS() {
        const userAgent = navigator.userAgent.toLowerCase();
        
        if (userAgent.includes('win')) {
            return { name: 'Windows', type: 'windows', icon: '🪟' };
        } else if (userAgent.includes('mac')) {
            return { name: 'macOS', type: 'macos', icon: '🍎' };
        } else if (userAgent.includes('linux')) {
            // Détection de ChromeOS (souvent Linux)
            if (userAgent.includes('cros')) {
                return { name: 'ChromeOS Flex', type: 'chromeos', icon: '🌐' };
            }
            return { name: 'Linux', type: 'linux', icon: '🐧' };
        } else {
            return { name: 'Non détecté', type: 'unknown', icon: '❓' };
        }
    }

    // Contenu des instructions
    const instructions = {
        windows: {
            steps: [
                { text: 'Téléchargez le script ci-dessous (ou cliquez sur "Télécharger")' },
                { text: 'Faites **clic droit** sur le fichier → "Exécuter en tant qu\'administrateur"' },
                { text: 'Patientez pendant l\'installation automatique' },
                { text: 'Un raccourci apparaîtra sur votre Bureau' }
            ],
            command: '@echo off\r\ntitle TATBooker Installer\r\necho Installation de TATBooker...\r\n\r\n:: Vérifier droits admin\r\nnet session >nul 2>&1\r\nif %errorlevel% neq 0 (\r\n    echo Droits administrateur requis\r\n    pause\r\n    exit /b 1\r\n)\r\n\r\n:: Détection architecture\r\nif "%PROCESSOR_ARCHITECTURE%"=="AMD64" (\r\n    set PYTHON_URL=https://www.python.org/ftp/python/3.12.0/python-3.12.0-amd64.exe\r\n) else (\r\n    set PYTHON_URL=https://www.python.org/ftp/python/3.12.0/python-3.12.0.exe\r\n)\r\n\r\n:: Installation de Python si absent\r\nwhere python >nul 2>&1\r\nif %errorlevel% neq 0 (\r\n    echo Téléchargement de Python...\r\n    powershell -Command "Invoke-WebRequest -Uri %PYTHON_URL% -OutFile %temp%\\python-installer.exe"\r\n    start /wait %temp%\\python-installer.exe /quiet InstallAllUsers=1 PrependPath=1\r\n    del %temp%\\python-installer.exe\r\n)\r\n\r\n:: Cloner le dépôt\r\nset APP_DIR=%USERPROFILE%\\TATBooker\r\nif not exist "%APP_DIR%" (\r\n    git clone https://github.com/votre-compte/tatbooker.git "%APP_DIR%" 2>nul || (\r\n        echo Git non trouvé. Installation avec ZIP...\r\n        powershell -Command "Invoke-WebRequest -Uri 'https://github.com/votre-compte/tatbooker/archive/main.zip' -OutFile %temp%\\tatbooker.zip"\r\n        powershell -Command "Expand-Archive -Path %temp%\\tatbooker.zip -DestinationPath %USERPROFILE%"\r\n        move "%USERPROFILE%\\tatbooker-main" "%APP_DIR%"\r\n    )\r\n)\r\n\r\ncd /d "%APP_DIR%"\r\n\r\n:: Environnement virtuel\r\npython -m venv venv\r\ncall venv\\Scripts\\activate.bat\r\npip install -r requirements.txt\r\n\r\n:: Raccourci Bureau\r\npowershell -Command "$WS = New-Object -ComObject WScript.Shell; $SC = $WS.CreateShortcut('%USERPROFILE%\\Desktop\\TATBooker.lnk'); $SC.TargetPath = '%APP_DIR%\\venv\\Scripts\\python.exe'; $SC.Arguments = '%APP_DIR%\\main.py'; $SC.Save()"\r\n\r\necho Installation terminée !\r\npause',
            scriptName: 'install_TATBooker.bat'
        },
        linux: {
            steps: [
                { text: 'Ouvrez un terminal (Ctrl+Alt+T)' },
                { text: 'Copiez-collez la commande ci-dessous et appuyez sur Entrée' },
                { text: 'Patientez pendant l\'installation' },
                { text: 'TATBooker sera disponible dans votre menu Applications' }
            ],
            command: 'bash -c "$(curl -fsSL https://raw.githubusercontent.com/bambino-117/TATBooker---developpement/main/install.sh)"',
            scriptName: 'install_TATBooker.sh'
        },
        macos: {
            steps: [
                { text: 'Téléchargez le script ci-dessous (ou cliquez sur "Télécharger")' },
                { text: 'Ouvrez un Terminal et tapez : `chmod +x ~/Downloads/install_TATBooker.command`' },
                { text: 'Double-cliquez sur le fichier pour lancer l\'installation' },
                { text: 'Suivez les instructions à l\'écran' }
            ],
            command: '#!/bin/bash\r\necho "Installation TATBooker sur macOS..."\r\n\r\n# Vérifier Homebrew\r\nif ! command -v brew &> /dev/null; then\r\n    /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"\r\nfi\r\n\r\n# Installer Git\r\nbrew install git\r\n\r\n# Cloner le dépôt\r\ncd ~\r\ngit clone https://github.com/votre-compte/tatbooker.git TATBooker\r\ncd TATBooker\r\n\r\n# Python via Homebrew\r\nbrew install python@3.12\r\n\r\n# Environnement virtuel\r\npython3 -m venv venv\r\nsource venv/bin/activate\r\npip install -r requirements.txt\r\n\r\necho "Installation terminée !"\r\nread -p "Appuyez sur Entrée pour quitter"',
            scriptName: 'install_TATBooker.command'
        },
        chromeos: {
            steps: [
                { text: 'Activez le Linux Developer Environment (Paramètres → Développeurs → Linux)' },
                { text: 'Ouvrez le terminal Linux (dans la fenêtre du conteneur)' },
                { text: 'Copiez-collez la commande ci-dessous' },
                { text: 'Patientez pendant l\'installation' }
            ],
            command: 'sudo apt update && sudo apt install -y git python3 python3-pip python3-venv\r\ngit clone https://github.com/votre-compte/tatbooker.git ~/TATBooker\r\ncd ~/TATBooker\r\npython3 -m venv venv\r\nsource venv/bin/activate\r\npip install -r requirements.txt\r\necho "Installation terminée !"',
            scriptName: 'install_TATBooker_chromeos.sh'
        },
        unknown: {
            steps: [
                { text: 'Votre système n\'a pas été automatiquement détecté.' },
                { text: 'TATBooker fonctionne sur Windows, macOS, Linux et ChromeOS.' },
                { text: 'Visitez notre documentation pour l\'installation manuelle :' }
            ],
            command: 'https://github.com/votre-compte/tatbooker#installation',
            scriptName: null
        }
    };

    // Mise à jour de l'interface
    const os = detectOS();
    const osInfo = instructions[os.type];

    // Mettre à jour le badge OS
    document.getElementById('osBadge').innerHTML = `<span>${os.icon}</span><span>${os.name} détecté</span>`;
    document.getElementById('osBadge').className = `os-badge ${os.type}`;

    // Générer les instructions
    const instructionsDiv = document.getElementById('instructions');
    
    let html = `<div class="instruction-box">`;
    html += `<div class="instruction-title">📋 INSTRUCTIONS (${os.name})</div>`;
    
    // Étapes
    osInfo.steps.forEach((step, idx) => {
        html += `
            <div class="step">
                <div class="step-number">${idx + 1}</div>
                <div>${step.text}</div>
            </div>
        `;
    });
    
    // Commande
    if (osInfo.command && !osInfo.command.startsWith('http')) {
        html += `
            <div class="instruction-title" style="margin-top: 16px;">💻 À copier dans le terminal</div>
            <div class="command" id="commandText">${osInfo.command}</div>
            <button class="copy-btn" onclick="copyCommand()">📋 Copier la commande</button>
        `;
    } else if (osInfo.command && osInfo.command.startsWith('http')) {
        html += `
            <div class="instruction-title" style="margin-top: 16px;">🔗 Lien vers la documentation</div>
            <div class="command"><a href="${osInfo.command}" target="_blank" style="color:#a78bfa;">${osInfo.command}</a></div>
        `;
    }
    
    html += `</div>`;
    instructionsDiv.innerHTML = html;

    // Gérer le téléchargement du script
    const downloadLink = document.getElementById('downloadLink');
    if (osInfo.scriptName) {
        // Générer un blob pour le téléchargement
        let scriptContent = osInfo.command;
        
        // Pour Windows, garder tel quel. Pour Linux/macOS, s'assurer du shebang
        if (os.type === 'linux' && !scriptContent.startsWith('#!/bin/bash')) {
            scriptContent = '#!/bin/bash\n\n' + scriptContent;
        }
        
        const blob = new Blob([scriptContent], { type: 'text/plain' });
        const url = URL.createObjectURL(blob);
        downloadLink.href = url;
        downloadLink.download = osInfo.scriptName;
        downloadLink.textContent = `📥 Télécharger ${osInfo.scriptName}`;
    } else {
        downloadLink.style.display = 'none';
    }

    // Fonction de copie
    window.copyCommand = function() {
        const commandText = document.getElementById('commandText').innerText;
        navigator.clipboard.writeText(commandText);
        alert('Commande copiée dans le presse-papier !');
    };
</script>
</body>
</html>
